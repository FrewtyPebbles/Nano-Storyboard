version: '3.8'

services:
  backend:
    # Build configuration
    build:
      context: .
      dockerfile: Dockerfile.backend
    
    # Name the container for easier reference
    container_name: fastapi_backend
    
    # Map port 8000 on your machine to port 8000 in the container
    ports:
      - "8000:8000"
    
    # Environment variables
    environment:
      - DATABASE_URL=sqlite:///./sql_app.db
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1

    # Volumes for development
    volumes:
      # Sync your local backend folder with the container folder
      # This allows for hot-reloading if uvicorn --reload is used
      - ./backend:/app/backend
      # Optional: Persist the SQLite database file on your host machine
      - ./sql_app.db:/app/sql_app.db

    # Ensure the container restarts if it crashes
    restart: unless-stopped